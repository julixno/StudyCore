<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyCore — Stundenplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0c;
    --bg-elevated:#131316;
    --panel:#18181c;
    --panel-2:#1f1f24;
    --border:#2a2a30;
    --border-soft:#212126;
    --red:#ff2138;
    --red-dim:#c8172a;
    --red-deep:#5c0b16;
    --red-glow:rgba(255,33,56,.35);
    --text:#f2f2f4;
    --text-dim:#98979f;
    --text-faint:#57565e;
    --radius:10px;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -10%, rgba(255,33,56,.08), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(255,33,56,.05), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    padding-bottom:80px;
  }

  ::selection{background:var(--red);color:#fff;}

  /* ---------- Header ---------- */
  header.top{
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 40px;
    border-bottom:1px solid var(--border-soft);
    position:sticky;top:0;
    background:rgba(10,10,12,.85);
    backdrop-filter:blur(10px);
    z-index:50;
  }
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand .mark{
    width:34px;height:34px;border-radius:8px;
    background:linear-gradient(155deg,var(--red),var(--red-deep));
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;
    box-shadow:0 0 20px var(--red-glow);
    flex-shrink:0;
  }
  .brand h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:30px;letter-spacing:1px;margin:0;
    line-height:1;
  }
  .brand h1 span{color:var(--red);}
  .brand small{color:var(--text-faint);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600;}

  .top-actions{display:flex;gap:10px;flex-wrap:wrap;}

  button{
    font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;
    border-radius:8px;border:1px solid var(--border);
    background:var(--panel-2);color:var(--text);
    padding:10px 16px;cursor:pointer;
    transition:all .15s ease;
    display:inline-flex;align-items:center;gap:7px;
  }
  button:hover{border-color:var(--red-dim);background:#242429;}
  button:active{transform:translateY(1px);}
  button.primary{
    background:linear-gradient(155deg,var(--red),var(--red-dim));
    border-color:var(--red);color:#fff;
    box-shadow:0 4px 20px -6px var(--red-glow);
  }
  button.primary:hover{filter:brightness(1.08);}
  button.ghost{background:transparent;}
  button.danger{color:#ff6b6b;}
  button.small{padding:6px 10px;font-size:12px;}
  button:disabled{opacity:.4;cursor:not-allowed;}

  input[type=file]{display:none;}

  /* ---------- Layout ---------- */
  main{
    max-width:1400px;margin:0 auto;padding:32px 40px;
    display:grid;grid-template-columns:340px 1fr;gap:24px;
    align-items:start;
  }
  @media (max-width:1000px){
    main{grid-template-columns:1fr;padding:24px 18px;}
    header.top{padding:18px 20px;}
  }

  .col-side{display:flex;flex-direction:column;gap:20px;position:sticky;top:96px;}
  @media (max-width:1000px){.col-side{position:static;}}

  .panel{
    background:var(--panel);
    border:1px solid var(--border-soft);
    border-radius:var(--radius);
    padding:20px;
  }
  .panel h2{
    font-family:'Bebas Neue',sans-serif;
    font-size:18px;letter-spacing:1px;margin:0 0 4px;
    display:flex;align-items:center;gap:8px;
  }
  .panel h2 .num{
    width:20px;height:20px;border-radius:5px;background:var(--red);
    color:#fff;font-family:'JetBrains Mono',monospace;font-size:11px;
    display:flex;align-items:center;justify-content:center;
  }
  .panel .desc{color:var(--text-faint);font-size:12.5px;margin:0 0 16px;}

  label{
    display:block;font-size:12px;font-weight:600;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:.6px;margin:14px 0 6px;
  }
  label:first-of-type{margin-top:0;}

  input[type=text], input[type=number], input[type=time]{
    width:100%;background:var(--bg-elevated);
    border:1px solid var(--border);border-radius:7px;
    color:var(--text);padding:10px 12px;font-size:14px;
    font-family:'Inter',sans-serif;
  }
  input[type=text]:focus, input[type=number]:focus, input[type=time]:focus{
    outline:none;border-color:var(--red);
    box-shadow:0 0 0 3px rgba(255,33,56,.15);
  }
  input[type=color]{
    -webkit-appearance:none;appearance:none;
    width:44px;height:38px;border:1px solid var(--border);
    border-radius:7px;background:var(--bg-elevated);cursor:pointer;padding:2px;
  }
  input[type=color]::-webkit-color-swatch{border:none;border-radius:5px;}

  .zeit-row{display:grid;grid-template-columns:26px 1fr auto 1fr;align-items:center;gap:8px;margin-bottom:8px;}
  .zeit-row .badge{
    width:24px;height:24px;border-radius:50%;background:var(--panel-2);
    border:1px solid var(--border);color:var(--text-dim);
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;
    display:flex;align-items:center;justify-content:center;
  }
  .zeit-row span.sep{color:var(--text-faint);text-align:center;font-size:12px;}

  .field-row{display:flex;gap:10px;}
  .field-row > div{flex:1;}

  .chip-group{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    padding:7px 12px;border-radius:20px;border:1px solid var(--border);
    background:var(--bg-elevated);color:var(--text-dim);
    font-size:12.5px;font-weight:600;cursor:pointer;user-select:none;
    transition:all .12s ease;
  }
  .chip:hover{border-color:var(--red-dim);}
  .chip.active{
    background:var(--red);border-color:var(--red);color:#fff;
    box-shadow:0 0 12px -2px var(--red-glow);
  }
  .chip.stunde{min-width:34px;text-align:center;}

  .tag-stunden-block{margin-top:8px;padding:10px 10px 12px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;}
  .tag-stunden-block .tsb-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .tag-stunden-block .tsb-head .tag-label{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.5px;color:var(--red);}
  .tag-stunden-block .tsb-head .tsb-count{font-size:10.5px;color:var(--text-faint);font-family:'JetBrains Mono',monospace;}
  .tsb-empty-hint{font-size:11.5px;color:var(--text-faint);margin-top:8px;}

  .form-actions{display:flex;gap:8px;margin-top:18px;}
  .form-actions button{flex:1;justify-content:center;}

  .eintraege-liste{display:flex;flex-direction:column;gap:8px;margin-top:14px;max-height:240px;overflow-y:auto;}
  .eintrag-item{
    display:flex;align-items:center;gap:10px;
    background:var(--bg-elevated);border:1px solid var(--border);
    border-radius:7px;padding:9px 10px;
  }
  .eintrag-item .dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;}
  .eintrag-item .info{flex:1;min-width:0;}
  .eintrag-item .info .t{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .eintrag-item .info .m{font-size:11px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .eintrag-item .acts{display:flex;gap:4px;}
  .eintrag-item .acts button{padding:5px 7px;}

  .empty-hint{color:var(--text-faint);font-size:12.5px;text-align:center;padding:14px 0;}

  /* ---------- Grid ---------- */
  .plan-wrap{background:var(--panel);border:1px solid var(--border-soft);border-radius:var(--radius);overflow:hidden;}
  .plan-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px 22px;border-bottom:1px solid var(--border-soft);
  }
  .plan-header h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;margin:0;}
  .plan-header .sub{color:var(--text-faint);font-size:12px;font-family:'JetBrains Mono',monospace;}

  .grid-scroll{overflow-x:auto;}
  table.plan{width:100%;border-collapse:collapse;min-width:720px;}
  table.plan th, table.plan td{border:1px solid var(--border-soft);}
  table.plan thead th{
    background:var(--panel-2);
    font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:1px;
    padding:12px 8px;color:var(--text);position:relative;
  }
  table.plan thead th::after{
    content:'';position:absolute;left:14%;right:14%;bottom:0;height:2px;
    background:var(--red);opacity:.7;
  }
  table.plan thead th.hcol{
    background:var(--bg-elevated);font-family:'JetBrains Mono',monospace;
    font-size:10px;color:var(--text-faint);letter-spacing:1px;
  }
  table.plan tbody th{
    background:var(--bg-elevated);width:78px;text-align:center;padding:6px 4px;
    vertical-align:middle;
  }
  .stunde-badge{
    width:26px;height:26px;border-radius:50%;background:var(--panel-2);
    border:1px solid var(--red-dim);color:var(--red);
    font-family:'JetBrains Mono',monospace;font-weight:700;font-size:12px;
    display:flex;align-items:center;justify-content:center;margin:0 auto 4px;
  }
  .stunde-zeit{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--text-faint);line-height:1.4;}

  table.plan td.cell{
    padding:4px;vertical-align:top;height:64px;min-width:120px;
  }
  .entry-block{
    border-radius:6px;padding:6px 8px;height:100%;
    display:flex;flex-direction:column;justify-content:center;gap:1px;
    border-left:3px solid rgba(255,255,255,.4);
  }
  .entry-block .fach{font-size:12.5px;font-weight:800;color:#fff;line-height:1.15;}
  .entry-block .meta{font-size:10.5px;color:rgba(255,255,255,.8);line-height:1.3;}
  .entry-block.merged{justify-content:center;padding:8px;}
  .entry-block.merged .fach{font-size:13.5px;}
  .entry-block .zeitspanne{font-size:9.5px;color:rgba(255,255,255,.65);font-family:'JetBrains Mono',monospace;margin-top:3px;}
  .entry-block.spanned{justify-content:center;}
  .entry-block .meta.zeit{opacity:.8;margin-top:3px;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;}

  .plan-empty{padding:60px 20px;text-align:center;color:var(--text-faint);}
  .plan-empty b{color:var(--text-dim);display:block;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:6px;}

  .print-only{display:none;}
  .print-legend{display:none;}

  /* ---------- Print ---------- */
  @page{ size: landscape; margin: 10mm; }

  @media print{
    body{background:#fff !important;color:#000;padding:0;}
    header.top, .col-side, .plan-header .sub, .no-print{display:none !important;}
    main{display:block;padding:0;max-width:none;}

    .plan-wrap{border:none;box-shadow:none;}
    .plan-header{
      display:block;border-bottom:2px solid #000;padding:0 0 10px;margin-bottom:12px;
    }
    .plan-header h2{color:#000;font-size:26px;}
    .print-only{display:flex !important;align-items:baseline;justify-content:space-between;gap:12px;}
    .print-only .p-brand{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;}
    .print-only .p-brand span{color:var(--red);}
    .print-only .p-date{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:#555;}

    .grid-scroll{overflow:visible;}
    table.plan{width:100%;min-width:0;table-layout:fixed;border-collapse:collapse;}
    table.plan thead{display:table-header-group;}
    table.plan tr{break-inside:avoid;page-break-inside:avoid;}
    table.plan thead th{
      background:#f0f0f0 !important;color:#000;
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
      border:1px solid #999;
    }
    table.plan thead th::after{background:#000;}
    table.plan thead th.hcol{background:#fff !important;color:#777;}
    table.plan tbody th{
      background:#f7f7f7 !important;color:#000;width:56px;
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
      border:1px solid #999;
    }
    .stunde-badge{border-color:#000;color:#000;background:#fff;}
    .stunde-zeit{color:#555;}
    table.plan td.cell{border:1px solid #ccc;height:auto;min-height:46px;padding:3px;}

    .entry-block{
      -webkit-print-color-adjust:exact;print-color-adjust:exact;
      border-left-width:3px;border-radius:4px;
    }
    .entry-block .fach{color:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .entry-block .meta, .entry-block .zeitspanne{color:rgba(255,255,255,.9);-webkit-print-color-adjust:exact;print-color-adjust:exact;}

    .print-legend{
      display:flex;flex-wrap:wrap;gap:10px 18px;
      margin-top:16px;padding-top:10px;border-top:1px solid #ccc;
    }
    .print-legend .leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#333;}
    .print-legend .leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <div class="mark">SC</div>
    <div>
      <h1>Study<span>Core</span></h1>
      <small>Stundenplaner</small>
    </div>
  </div>
  <div class="top-actions no-print">
    <button class="ghost small" id="btnLoad">⇪ JSON laden</button>
    <input type="file" id="fileInput" accept="application/json">
    <button class="ghost" id="btnSave">⇩ Als JSON speichern</button>
    <button class="primary" id="btnPrint">🖨 Drucken</button>
  </div>
</header>

<main>
  <div class="col-side no-print">

    <div class="panel">
      <h2><span class="num">1</span>Zeitraster</h2>
      <p class="desc">Lege fest, wie viele Stunden ein Tag maximal hat und wann sie beginnen/enden.</p>
      <label for="maxStunden">Stunden pro Tag</label>
      <input type="number" id="maxStunden" min="1" max="16" value="8">
      <label style="margin-top:16px;">Uhrzeiten</label>
      <div id="zeitenListe"></div>
    </div>

    <div class="panel">
      <h2><span class="num">2</span><span id="formTitle">Neues Fach</span></h2>
      <p class="desc">Erstelle einen Eintrag und ordne ihn Tagen &amp; Stunden zu.</p>

      <label>Titel (Fach)</label>
      <input type="text" id="fTitel" placeholder="z. B. Mathematik">

      <div class="field-row">
        <div>
          <label>Lehrer</label>
          <input type="text" id="fLehrer" placeholder="z. B. Fr. Schmidt">
        </div>
        <div>
          <label>Raum</label>
          <input type="text" id="fRaum" placeholder="z. B. R204">
        </div>
      </div>

      <label>Farbe</label>
      <input type="color" id="fFarbe" value="#ff2138">

      <label>Tage</label>
      <div class="chip-group" id="tageChips"></div>

      <label>Stunden je Tag</label>
      <div id="tageStundenBox"></div>

      <div class="form-actions">
        <button class="ghost" id="btnReset">Zurücksetzen</button>
        <button class="primary" id="btnAdd">+ Hinzufügen</button>
      </div>
    </div>

    <div class="panel">
      <h2><span class="num">3</span>Fächer</h2>
      <div class="eintraege-liste" id="eintraegeListe">
        <div class="empty-hint">Noch keine Fächer angelegt.</div>
      </div>
    </div>

  </div>

  <div class="plan-wrap">
    <div class="plan-header">
      <h2>Wochenplan</h2>
      <span class="sub" id="planSub">0 EINTRÄGE</span>
      <div class="print-only">
        <span class="p-brand">Study<span>Core</span> · Wochenplan</span>
        <span class="p-date" id="printDate"></span>
      </div>
    </div>
    <div class="grid-scroll">
      <table class="plan" id="planTable"></table>
    </div>
    <div class="print-legend" id="printLegend"></div>
  </div>
</main>

<script>
(function(){
  const TAGE = ["Mo","Di","Mi","Do","Fr"];

  const state = {
    maxStunden: 8,
    zeiten: [],
    eintraege: []
  };

  const defaultZeit = (i) => {
    const startMin = 8*60 + i*50;
    const fmt = m => String(Math.floor(m/60)).padStart(2,'0')+":"+String(m%60).padStart(2,'0');
    return { start: fmt(startMin), end: fmt(startMin+45) };
  };
  for(let i=0;i<state.maxStunden;i++) state.zeiten.push(defaultZeit(i));

  let editId = null;
  let formTageStunden = {}; // { "Mo": Set([1,2]), "Mi": Set([3]) }

  const $ = sel => document.querySelector(sel);
  const uid = () => 'e'+Math.random().toString(36).slice(2,9);

  function hexToRgba(hex, a){
    const c = hex.replace('#','');
    const r = parseInt(c.substring(0,2),16), g = parseInt(c.substring(2,4),16), b = parseInt(c.substring(4,6),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  /* ---------------- Zeitraster ---------------- */
  function renderZeiten(){
    const list = $('#zeitenListe');
    list.innerHTML = '';
    for(let i=0;i<state.maxStunden;i++){
      if(!state.zeiten[i]) state.zeiten[i] = defaultZeit(i);
      const row = document.createElement('div');
      row.className = 'zeit-row';
      row.innerHTML = `
        <span class="badge">${i+1}</span>
        <input type="time" data-i="${i}" data-k="start" value="${state.zeiten[i].start}">
        <span class="sep">–</span>
        <input type="time" data-i="${i}" data-k="end" value="${state.zeiten[i].end}">
      `;
      list.appendChild(row);
    }
    list.querySelectorAll('input[type=time]').forEach(inp=>{
      inp.addEventListener('change', e=>{
        const i = +e.target.dataset.i, k = e.target.dataset.k;
        state.zeiten[i][k] = e.target.value;
        renderPlan();
      });
    });
  }

  $('#maxStunden').addEventListener('input', e=>{
    let v = parseInt(e.target.value,10);
    if(isNaN(v) || v<1) v=1;
    if(v>16) v=16;
    state.maxStunden = v;
    while(state.zeiten.length < v) state.zeiten.push(defaultZeit(state.zeiten.length));
    state.zeiten = state.zeiten.slice(0,v);
    state.eintraege.forEach(en=>{
      const ts = normalizeTageStunden(en);
      const filtered = {};
      Object.keys(ts).forEach(t=>{
        const arr = ts[t].filter(s=>s<=v);
        if(arr.length>0) filtered[t] = arr;
      });
      en.tageStunden = filtered;
      delete en.tage;
      delete en.stunden;
    });
    renderZeiten();
    renderTageStundenBox();
    renderEintraegeListe();
    renderPlan();
  });

  /* ---------------- Formular: Chips ---------------- */
  function renderTageChips(){
    const box = $('#tageChips');
    box.innerHTML = '';
    TAGE.forEach(t=>{
      const active = Object.prototype.hasOwnProperty.call(formTageStunden, t);
      const chip = document.createElement('div');
      chip.className = 'chip' + (active?' active':'');
      chip.textContent = t;
      chip.addEventListener('click', ()=>{
        if(Object.prototype.hasOwnProperty.call(formTageStunden, t)){
          delete formTageStunden[t];
        } else {
          formTageStunden[t] = new Set();
        }
        renderTageChips();
        renderTageStundenBox();
      });
      box.appendChild(chip);
    });
  }

  function renderTageStundenBox(){
    const box = $('#tageStundenBox');
    box.innerHTML = '';
    const activeTage = TAGE.filter(t => Object.prototype.hasOwnProperty.call(formTageStunden, t));
    if(activeTage.length===0){
      box.innerHTML = '<div class="tsb-empty-hint">Zuerst oben mindestens einen Tag auswählen.</div>';
      return;
    }
    activeTage.forEach(t=>{
      const block = document.createElement('div');
      block.className = 'tag-stunden-block';
      const count = formTageStunden[t].size;
      block.innerHTML = `<div class="tsb-head"><span class="tag-label">${t}</span><span class="tsb-count">${count} STD.</span></div>`;
      const chipGroup = document.createElement('div');
      chipGroup.className = 'chip-group';
      for(let i=1;i<=state.maxStunden;i++){
        const chip = document.createElement('div');
        chip.className = 'chip stunde' + (formTageStunden[t].has(i)?' active':'');
        chip.textContent = i;
        chip.addEventListener('click', ()=>{
          formTageStunden[t].has(i) ? formTageStunden[t].delete(i) : formTageStunden[t].add(i);
          renderTageStundenBox();
        });
        chipGroup.appendChild(chip);
      }
      block.appendChild(chipGroup);
      box.appendChild(block);
    });
  }

  function resetForm(){
    editId = null;
    $('#formTitle').textContent = 'Neues Fach';
    $('#fTitel').value = '';
    $('#fLehrer').value = '';
    $('#fRaum').value = '';
    $('#fFarbe').value = '#ff2138';
    formTageStunden = {};
    renderTageChips();
    renderTageStundenBox();
    $('#btnAdd').textContent = '+ Hinzufügen';
  }
  $('#btnReset').addEventListener('click', resetForm);

  $('#btnAdd').addEventListener('click', ()=>{
    const titel = $('#fTitel').value.trim();
    if(!titel){ $('#fTitel').focus(); return; }
    if(Object.keys(formTageStunden).length===0){
      alert('Bitte mindestens einen Tag auswählen.');
      return;
    }
    const tageStunden = {};
    Object.keys(formTageStunden).forEach(t=>{
      const arr = Array.from(formTageStunden[t]).sort((a,b)=>a-b);
      if(arr.length>0) tageStunden[t] = arr;
    });
    if(Object.keys(tageStunden).length===0){
      alert('Bitte für mindestens einen Tag auch eine Stunde festlegen.');
      return;
    }
    const eintrag = {
      id: editId || uid(),
      titel,
      lehrer: $('#fLehrer').value.trim(),
      raum: $('#fRaum').value.trim(),
      farbe: $('#fFarbe').value,
      tageStunden
    };
    if(editId){
      const idx = state.eintraege.findIndex(e=>e.id===editId);
      state.eintraege[idx] = eintrag;
    } else {
      state.eintraege.push(eintrag);
    }
    resetForm();
    renderEintraegeListe();
    renderPlan();
  });

  function normalizeTageStunden(en){
    if(en.tageStunden) return en.tageStunden;
    if(Array.isArray(en.tage) && Array.isArray(en.stunden)){
      const obj = {};
      en.tage.forEach(t => obj[t] = en.stunden.slice());
      return obj;
    }
    return {};
  }

  function tageStundenSummary(en){
    const ts = normalizeTageStunden(en);
    return TAGE.filter(t=> ts[t] && ts[t].length)
      .map(t => `${t} ${ts[t].join(',')}`)
      .join(' · ');
  }

  function loadIntoForm(en){
    editId = en.id;
    $('#formTitle').textContent = 'Fach bearbeiten';
    $('#fTitel').value = en.titel;
    $('#fLehrer').value = en.lehrer;
    $('#fRaum').value = en.raum;
    $('#fFarbe').value = en.farbe;
    formTageStunden = {};
    const ts = normalizeTageStunden(en);
    Object.keys(ts).forEach(t=> formTageStunden[t] = new Set(ts[t]));
    renderTageChips();
    renderTageStundenBox();
    $('#btnAdd').textContent = '✓ Aktualisieren';
    window.scrollTo({top:0, behavior:'smooth'});
  }

  function renderEintraegeListe(){
    const box = $('#eintraegeListe');
    box.innerHTML = '';
    if(state.eintraege.length===0){
      box.innerHTML = '<div class="empty-hint">Noch keine Fächer angelegt.</div>';
      return;
    }
    state.eintraege.forEach(en=>{
      const item = document.createElement('div');
      item.className = 'eintrag-item';
      item.innerHTML = `
        <div class="dot" style="background:${en.farbe}"></div>
        <div class="info">
          <div class="t">${escapeHtml(en.titel)}</div>
          <div class="m">${tageStundenSummary(en)}${en.raum? ' · '+escapeHtml(en.raum):''}</div>
        </div>
        <div class="acts">
          <button class="small" data-act="edit" data-id="${en.id}">✎</button>
          <button class="small danger" data-act="del" data-id="${en.id}">✕</button>
        </div>
      `;
      box.appendChild(item);
    });
    box.querySelectorAll('button[data-act]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = btn.dataset.id;
        if(btn.dataset.act==='del'){
          state.eintraege = state.eintraege.filter(e=>e.id!==id);
          if(editId===id) resetForm();
          renderEintraegeListe();
          renderPlan();
        } else {
          const en = state.eintraege.find(e=>e.id===id);
          if(en) loadIntoForm(en);
        }
      });
    });
  }

  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  /* ---------------- Stundenplan-Grid ---------------- */
  function renderPlan(){
    const table = $('#planTable');
    table.innerHTML = '';

    const thead = document.createElement('thead');
    const trh = document.createElement('tr');
    trh.innerHTML = '<th class="hcol">Std.</th>' + TAGE.map(t=>`<th>${t}</th>`).join('');
    thead.appendChild(trh);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');

    // Alle Treffer pro Tag/Stunde vorab ermitteln
    const matches = {};
    TAGE.forEach(tag=>{
      matches[tag] = {};
      for(let s=1;s<=state.maxStunden;s++){
        matches[tag][s] = state.eintraege.filter(en=>{
          const ts = normalizeTageStunden(en);
          return ts[tag] && ts[tag].includes(s);
        });
      }
    });
    const consumed = {};
    TAGE.forEach(tag=> consumed[tag] = new Set());

    for(let s=1;s<=state.maxStunden;s++){
      const tr = document.createElement('tr');
      const z = state.zeiten[s-1] || {start:'--:--',end:'--:--'};
      const th = document.createElement('th');
      th.innerHTML = `<div class="stunde-badge">${s}</div><div class="stunde-zeit">${z.start}<br>${z.end}</div>`;
      tr.appendChild(th);

      TAGE.forEach(tag=>{
        if(consumed[tag].has(s)) return;

        const td = document.createElement('td');
        td.className = 'cell';
        const treffer = matches[tag][s];

        if(treffer.length === 1){
          const en = treffer[0];
          let span = 1, next = s+1;
          while(next<=state.maxStunden){
            const nm = matches[tag][next];
            if(nm.length===1 && nm[0].id===en.id){
              span++; consumed[tag].add(next); next++;
            } else break;
          }
          if(span>1) td.rowSpan = span;
          const block = document.createElement('div');
          block.className = 'entry-block' + (span>1 ? ' merged' : '');
          block.style.background = `linear-gradient(155deg, ${hexToRgba(en.farbe,.95)}, ${hexToRgba(en.farbe,.65)})`;
          block.style.borderLeftColor = en.farbe;
          const zeitInfo = span>1
            ? `<div class="zeitspanne">${(state.zeiten[s-1]||{}).start||''} – ${(state.zeiten[s+span-2]||{}).end||''}</div>`
            : '';
          block.innerHTML = `
            <div class="fach">${escapeHtml(en.titel)}</div>
            <div class="meta">${[en.lehrer, en.raum].filter(Boolean).map(escapeHtml).join(' · ')}</div>
            ${zeitInfo}
          `;
          td.appendChild(block);
        } else if(treffer.length > 1){
          treffer.forEach(en=>{
            const block = document.createElement('div');
            block.className = 'entry-block';
            block.style.background = `linear-gradient(155deg, ${hexToRgba(en.farbe,.95)}, ${hexToRgba(en.farbe,.65)})`;
            block.style.borderLeftColor = en.farbe;
            block.innerHTML = `
              <div class="fach">${escapeHtml(en.titel)}</div>
              <div class="meta">${[en.lehrer, en.raum].filter(Boolean).map(escapeHtml).join(' · ')}</div>
            `;
            td.appendChild(block);
          });
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);

    $('#planSub').textContent = state.eintraege.length + (state.eintraege.length===1 ? ' EINTRAG' : ' EINTRÄGE');

    const legend = $('#printLegend');
    if(state.eintraege.length === 0){
      legend.innerHTML = '';
    } else {
      legend.innerHTML = state.eintraege.map(en => `
        <div class="leg-item">
          <span class="leg-dot" style="background:${en.farbe}"></span>
          <span>${escapeHtml(en.titel)}${en.lehrer ? ' · '+escapeHtml(en.lehrer) : ''}${en.raum ? ' · '+escapeHtml(en.raum) : ''}</span>
        </div>
      `).join('');
    }
  }

  /* ---------------- Speichern / Laden ---------------- */
  $('#btnSave').addEventListener('click', ()=>{
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'studycore-stundenplan.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  $('#btnLoad').addEventListener('click', ()=> $('#fileInput').click());
  $('#fileInput').addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const data = JSON.parse(ev.target.result);
        if(typeof data.maxStunden === 'number') state.maxStunden = data.maxStunden;
        if(Array.isArray(data.zeiten)) state.zeiten = data.zeiten;
        if(Array.isArray(data.eintraege)) state.eintraege = data.eintraege;
        while(state.zeiten.length < state.maxStunden) state.zeiten.push(defaultZeit(state.zeiten.length));
        $('#maxStunden').value = state.maxStunden;
        resetForm();
        renderZeiten();
        renderEintraegeListe();
        renderPlan();
      }catch(err){
        alert('Diese Datei konnte nicht gelesen werden. Bitte eine gültige StudyCore-JSON-Datei wählen.');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  $('#btnPrint').addEventListener('click', ()=>{
    const now = new Date();
    const datum = now.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit', year:'numeric'});
    $('#printDate').textContent = 'Erstellt am ' + datum;
    window.print();
  });

  /* ---------------- Init ---------------- */
  renderZeiten();
  renderTageChips();
  renderTageStundenBox();
  renderEintraegeListe();
  renderPlan();
})();
</script>
</body>
</html>
